<!DOCTYPE html>
<html>
<head>
    <title>Web Pertama Hano</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        h1 {
            color: #2ea043;
        }
        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2ea043;
            transform: scale(1.05);
        }
        #hasil {
            margin-top: 20px;
            font-size: 20px;
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <h1>halo dunia</h1>
    <p>ini web pertama gue klik tombol dibawah:</p>
    
    <button onclick="pencetTombol()">klik gue bro</button>
    
    <p id="hasil"></p>

    <script>
        let jumlahKlik = 0;
        function pencetTombol() {
            jumlahKlik = jumlahKlik + 1;
            document.getElementById('hasil').innerHTML = 
            'ANJIR BISA BRO 🔥 Udah diklik ' + jumlahKlik + 'x';
        }
    </script>
</body>
</html>
